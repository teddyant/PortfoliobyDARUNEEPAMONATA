<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard — ตัวอย่างผลงาน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --a:#5D4037; --a-bg:#EFEBE9; --a-dk:#3E2723;
  --b:#6D9886; --b-bg:#E0F0EB; --b-dk:#3B6E60;
  --c:#8D6748; --c-bg:#F3EAE0; --c-dk:#5C3D20;
  --am:#A5886B; --am-bg:#FAF3EC;
  --red:#C0392B; --red-bg:#FDEDEC; --red-dk:#922B21;
  --grn:#27AE60; --grn-bg:#E9F7EF;
  --bg:#FAF7F4; --sur:#fff;
  --t1:#1a1a18; --t2:#5f5e5a; --t3:#b4b2a9;
  --bd:#E8E0D8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{padding-bottom:48px;font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--t1);font-size:16px;}
.nav{position:sticky;top:0;z-index:100;background:#1a1a18;display:flex;align-items:center;padding:0 20px;height:52px;gap:2px;overflow-x:auto;}
.nav-brand{color:#fff;font-weight:700;font-size:15px;margin-right:14px;white-space:nowrap;}
.nav-brand em{color:#f59e0b;font-style:normal;}
.nb{background:none;border:none;color:#888;font-size:13px;font-family:inherit;font-weight:500;padding:5px 11px;border-radius:7px;cursor:pointer;white-space:nowrap;}
.nb:hover,.nb.on{color:#fff;background:#2a2a28;}
.nb.ex{background:#A5886B!important;color:#fff!important;font-weight:700!important;}
.nb.ex.on{background:#8D6748!important;}
.nr{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.live{display:flex;align-items:center;gap:5px;color:#4ade80;font-size:12px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.upd{font-size:12px;color:#888;}

.page{display:none;padding:20px 22px 60px;max-width:1100px;margin:0 auto;}
.page.on{display:block;}
.pg-title{font-size:22px;font-weight:700;margin-bottom:2px;}
.pg-sub{font-size:13px;color:var(--t2);margin-bottom:16px;}

.sec{margin-bottom:26px;}
.sec-hdr{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--bd);}

/* SUMBAR */
.sumbar{background:#1a1a18;border-radius:14px;padding:14px 20px;display:flex;flex-wrap:wrap;gap:0;margin-bottom:16px;}
.si{padding:0 20px;border-right:1px solid #333;}
.si:first-child{padding-left:0;}.si:last-child{border-right:none;}
.slbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.sval{font-size:22px;font-weight:700;color:#fff;}
.sval.am{color:#f59e0b;}.sval.ca{color:#93b8ff;}.sval.cb{color:#6dd9b5;}

/* METRIC CARDS */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
.mc{background:var(--sur);border:1px solid var(--bd);border-radius:13px;padding:15px 17px;}
.mc.ca{border-top:4px solid var(--a);} .mc.cb{border-top:4px solid var(--b);} .mc.cc{border-top:4px solid var(--c);} .mc.tot{border-top:4px solid var(--am);}
.mlbl{font-size:12px;color:var(--t2);margin-bottom:4px;}
.mval{font-size:26px;font-weight:700;line-height:1.1;}
.mval.ca{color:var(--a);}.mval.cb{color:var(--b);}.mval.cc{color:var(--c);}.mval.am{color:var(--am);}
.msub{font-size:12px;color:var(--t3);margin-top:4px;}

/* PROGRESS */
.prog{margin-bottom:10px;}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.prog-lbl{font-size:13px;color:var(--t2);}
.prog-pct{font-size:20px;font-weight:700;}
.prog-bg{width:100%;height:10px;background:var(--bg);border-radius:6px;overflow:hidden;}
.prog-bar{height:100%;border-radius:6px;}
.prog-info{font-size:12px;color:var(--t3);margin-top:3px;}

/* BADGE */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.b-ok{background:var(--grn-bg);color:#14532d;}
.b-near{background:var(--am-bg);color:#78350f;}
.b-low{background:var(--red-bg);color:var(--red-dk);}

/* BRANCH CARD */
.bcard{background:var(--sur);border:1px solid var(--bd);border-radius:15px;overflow:hidden;margin-bottom:14px;}
.bcard-top{padding:14px 18px 12px;}
.bcard-top.ca{background:var(--a-bg);border-bottom:1px solid #d0b8b0;}
.bcard-top.cb{background:var(--b-bg);border-bottom:1px solid #a8cfc4;}
.bcard-top.cc{background:var(--c-bg);border-bottom:1px solid #c9a882;}
.bname{font-size:17px;font-weight:700;}
.bname.ca{color:var(--a-dk);}.bname.cb{color:var(--b-dk);}.bname.cc{color:var(--c-dk);}
.brev{font-size:34px;font-weight:700;margin-top:2px;line-height:1.1;}
.brev.ca{color:var(--a);}.brev.cb{color:var(--b);}.brev.cc{color:var(--c);}
.bmeta{font-size:14px;color:var(--t2);margin-top:3px;}
.bbody{padding:13px 18px;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px;}
.sbox{background:var(--bg);border-radius:9px;padding:9px 12px;text-align:center;}
.sbox-lbl{font-size:11px;color:var(--t2);margin-bottom:2px;}
.sbox-val{font-size:19px;font-weight:700;}

/* TIER STRIP */
.tstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px;}
.tbox{border-radius:10px;padding:10px 6px;text-align:center;}
.t100{background:#dcfce7;}.t150{background:#eef4ff;}.t200{background:#f3e8ff;}.t250{background:#fff7ed;}.t300{background:#fef2f2;}
.tnm{font-size:11px;font-weight:700;margin-bottom:2px;}
.t100 .tnm{color:#14532d;}.t150 .tnm{color:#0c44a0;}.t200 .tnm{color:#5b21b6;}.t250 .tnm{color:#92400e;}.t300 .tnm{color:#991b1b;}
.tqty{font-size:21px;font-weight:700;}
.t100 .tqty{color:#14532d;}.t150 .tqty{color:#1a6bff;}.t200 .tqty{color:#7c3aed;}.t250 .tqty{color:#c2410c;}.t300 .tqty{color:#ef4444;}
.tstock{font-size:12px;color:var(--t2);margin-top:3px;font-weight:600;}
.tstock.warn{color:#ef4444;}.tstock.ok{color:#16a34a;}
.tmtd{font-size:10px;color:var(--t3);margin-top:1px;}

/* TABLES */
.tbl{background:var(--sur);border:1px solid var(--bd);border-radius:13px;overflow:hidden;}
.tbl-hdr{display:grid;padding:9px 18px;background:var(--bg);font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd);}
.tbl-row{display:grid;padding:10px 18px;border-bottom:1px solid var(--bd);align-items:center;font-size:14px;}
.tbl-row:last-child{border-bottom:none;}
.tbl-row:hover{background:#fafaf8;}
.tbl-row.pk{background:#fffbeb;}
.tbl-row.tot{background:var(--bg);font-weight:700;}
.tbl-row.today{background:#fffbeb;}
.tr{text-align:right;}
.pk-nm{color:#78350f;font-weight:700;}.pk-v{color:#78350f;font-weight:700;}
.hit{color:var(--grn);font-size:12px;}.miss{color:var(--red);font-size:12px;}
.dc{font-size:13px;}.dd{font-size:12px;font-weight:700;}
/* col layouts */
.hc2{grid-template-columns:70px 80px 1fr 45px 80px 1fr 45px 80px 85px;}
.pc{grid-template-columns:1fr 55px 100px 60px 48px 60px 60px 60px 60px;}
.sc{grid-template-columns:38px 1fr 70px 54px 84px 70px;}
.snm{font-size:14px;font-weight:600;}
.scd{font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace;}
.sqty{text-align:right;font-size:16px;font-weight:700;}
.srev{text-align:right;font-size:14px;font-weight:600;}
.spct{text-align:right;font-size:12px;color:var(--t3);}
.rnk{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.r1{background:#fef3c7;color:#92400e;}.r2{background:#f1f5f9;color:#334155;}.r3{background:#fff7ed;color:#c2410c;}
.rn{font-size:13px;color:var(--t3);}
.tp{display:inline-block;border-radius:5px;padding:2px 8px;font-size:12px;font-weight:700;}
.tp100{background:#dcfce7;color:#14532d;}.tp150{background:#eef4ff;color:#0c44a0;}
.tp200{background:#f3e8ff;color:#5b21b6;}.tp250{background:#fff7ed;color:#92400e;}.tp300{background:#fef2f2;color:#991b1b;}

/* CHART BOX */
.cbox{background:var(--sur);border:1px solid var(--bd);border-radius:13px;padding:18px;}
.cleg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:14px;color:var(--t2);}
.csq{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}
.ch{position:relative;width:100%;}

/* CANVA / REPORT PAGE */
.canva-header{background:#1a1a18;border-radius:16px;padding:20px 26px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.canva-brand{font-size:20px;font-weight:800;color:#fff;letter-spacing:.04em;}
.canva-brand em{color:#f59e0b;font-style:normal;}
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.compare-card{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;text-align:center;}
.compare-card.current{border:2px solid var(--am);background:var(--am-bg);}
.compare-lbl{font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.compare-val{font-size:28px;font-weight:800;}
.compare-card.current .compare-val{color:var(--am);}
.compare-sub{font-size:12px;color:var(--t3);margin-top:4px;}
.area-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px;}
.area-card{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:15px 18px;}
.area-name{font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
.area-sale{font-size:26px;font-weight:800;color:var(--a);}
.area-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:7px;}
.area-lbl{font-size:13px;color:var(--t2);}
.area-pct{font-size:15px;font-weight:700;}
.grand-box{background:#1a1a18;border-radius:14px;padding:18px 24px;margin-bottom:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;}
.grand-item{padding:0 18px;border-right:1px solid #333;}
.grand-item:first-child{padding-left:0;}.grand-item:last-child{border-right:none;}
.grand-lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.grand-val{font-size:20px;font-weight:700;color:#fff;}
.grand-val.amber{color:#f59e0b;}
.online-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.online-card{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:14px 18px;text-align:center;}
.online-card.total{background:var(--a-bg);border-color:var(--a);}
.online-lbl{font-size:12px;color:var(--t2);margin-bottom:5px;font-weight:600;}
.online-val{font-size:24px;font-weight:800;color:var(--a);}

/* EXEC */
.exec-page{padding:14px 14px 80px;max-width:520px;margin:0 auto;}
.exec-hero{background:#1a1a18;border-radius:20px;padding:22px 20px;margin-bottom:14px;text-align:center;}
.exec-hero-lbl{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.exec-hero-val{font-size:42px;font-weight:800;color:#f59e0b;line-height:1;}
.exec-hero-sub{font-size:13px;color:#aaa;margin-top:5px;}
.exec-prog-bg{width:100%;height:9px;background:#333;border-radius:5px;overflow:hidden;margin-top:12px;}
.exec-prog-bar{height:100%;border-radius:5px;}
.exec-branch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.exec-branch{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:14px 12px;}
.exec-branch-nm{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.exec-branch-val{font-size:22px;font-weight:800;line-height:1.1;}
.exec-branch-meta{font-size:11px;color:var(--t3);margin-top:3px;}
.exec-section{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;}
.exec-sec-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--bd);}
.exec-peak-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:13px;}
.exec-peak-row:last-child{border-bottom:none;}
.exec-peak-row.pk{background:#fffbeb;border-radius:7px;padding:6px 7px;}
.exec-cum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.exec-cum-item{background:var(--bg);border-radius:9px;padding:9px 11px;text-align:center;}
.exec-cum-lbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.exec-cum-val{font-size:17px;font-weight:700;}

/* DAY BADGE */
.day-badge{display:inline-block;font-size:12px;font-weight:700;padding:2px 10px;border-radius:14px;}

/* DISCLAIMER */
.disclaimer{position:fixed;bottom:0;left:0;right:0;z-index:9998;background:linear-gradient(90deg,#3E2723,#6D4C41);color:#fff;font-family:'Sarabun',sans-serif;font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 20px;box-shadow:0 -2px 12px rgba(0,0,0,.2);}
.spin{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--a);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

const N  = v => Number(v).toLocaleString('th-TH');
const P  = v => (v*100).toFixed(1)+'%';
const PC = v => v >= 1 ? 'var(--grn)' : v >= 0.7 ? '#f59e0b' : 'var(--red)';
const BD = v => v >= 1 ? '<span class="badge b-ok">บรรลุเป้า ✓</span>'
              : v >= 0.7 ? '<span class="badge b-near">ใกล้เป้า</span>'
              : '<span class="badge b-low">ต่ำกว่าเป้า</span>';
const TP  = p => p<=100?'tp100':p<=150?'tp150':p<=200?'tp200':p<=250?'tp250':'tp300';
const TBOX = p => p<=100?'t100':p<=150?'t150':p<=200?'t200':p<=250?'t250':'t300';
const RNK = r => typeof r==='string' ? `<span style="font-size:18px">${r}</span>`
                                      : `<span class="rnk r${r<4?r:''}" style="${r>=4?'background:#f5f5f5;color:#999':''}">${r}</span>`;
const DAYBADGE = () => `<span class="day-badge" style="background:${DAY_BG};color:${DAY_COLOR};">${DAY_EN}</span>`;
const STOCKCLS = s => s==='หมด!'?'warn':s==='ใกล้หมด'?'warn':'ok';

function go(id, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  el.classList.add('on');
}

function renderP3() {
  // combined all branches
  const allPeak = BRANCHES[0].peak.map((row, i) => ({
    slot: row.slot,
    bills: BRANCHES.reduce((s,b)=>s+b.peak[i].bills, 0),
    rev:   BRANCHES.reduce((s,b)=>s+b.peak[i].rev, 0),
    t100:  BRANCHES.reduce((s,b)=>s+b.peak[i].t100, 0),
    t150:  BRANCHES.reduce((s,b)=>s+b.peak[i].t150, 0),
    t200:  BRANCHES.reduce((s,b)=>s+b.peak[i].t200, 0),
    t250:  BRANCHES.reduce((s,b)=>s+b.peak[i].t250, 0),
    t300:  BRANCHES.reduce((s,b)=>s+b.peak[i].t300, 0),
  }));
  const totRev = allPeak.reduce((s,r)=>s+r.rev, 0);
  const totBills = allPeak.reduce((s,r)=>s+r.bills, 0);
  const maxRev = Math.max(...allPeak.map(r=>r.rev));
  const peakSlot = allPeak.find(r=>r.rev===maxRev);

  const peakTable = (rows) => {
    const mx = Math.max(...rows.map(r=>r.rev));
    const tot_r = rows.reduce((s,r)=>s+r.rev,0);
    return `
    <div class="tbl">
      <div class="tbl-hdr pc"><span>ช่วงเวลา</span><span class="tr">บิล</span><span class="tr">ยอด (฿)</span><span class="tr">%ยอด</span><span class="tr">฿100</span><span class="tr">฿150</span><span class="tr">฿200</span><span class="tr">฿250</span><span class="tr">฿300</span></div>
      ${rows.map(r=>{
        const isPk = r.rev===mx;
        return `<div class="tbl-row pc ${isPk?'pk':''}">
          <span class="${isPk?'pk-nm':''}">${r.slot}${isPk?' ★':''}</span>
          <span class="tr">${N(r.bills)}</span>
          <span class="tr ${isPk?'pk-v':''}">${N(r.rev)}</span>
          <span class="tr">${P(r.rev/tot_r)}</span>
          <span class="tr">${r.t100}</span><span class="tr">${r.t150}</span>
          <span class="tr">${r.t200}</span><span class="tr">${r.t250}</span><span class="tr">${r.t300}</span>
        </div>`;
      }).join('')}
      <div class="tbl-row pc tot">
        <span>รวม</span>
        <span class="tr">${N(rows.reduce((s,r)=>s+r.bills,0))}</span>
        <span class="tr">${N(rows.reduce((s,r)=>s+r.rev,0))}</span>
        <span class="tr">100%</span>
        <span class="tr">${rows.reduce((s,r)=>s+r.t100,0)}</span>
        <span class="tr">${rows.reduce((s,r)=>s+r.t150,0)}</span>
        <span class="tr">${rows.reduce((s,r)=>s+r.t200,0)}</span>
        <span class="tr">${rows.reduce((s,r)=>s+r.t250,0)}</span>
        <span class="tr">${rows.reduce((s,r)=>s+r.t300,0)}</span>
      </div>
    </div>`;
  };

  let h = `
  <div class="pg-title">Peak Time Analysis</div>
  <div class="pg-sub">ข้อมูลวันที่ ${TODAY} · บิลรวม ${totBills} · รายได้รวม ${N(totRev)} ฿ · Peak: ${peakSlot.slot} ★</div>

  <div class="sec"><div class="sec-hdr">รวมทุกสาขา — ${totBills} บิล · ${N(totRev)} ฿</div>
  <div class="cbox" style="margin-bottom:13px;">
    <div class="ch" style="height:200px;"><canvas id="pkchart"></canvas></div>
  </div>
  ${peakTable(allPeak)}</div>

  ${BRANCHES.map(b=>`

// ════════════════════════════════════════════
// DAY META
// ════════════════════════════════════════════
function getDayMeta(dateStr) {
  const CFG = [
    {s:'Sun',c:'#dc2626'},{s:'Mon',c:'#ca8a04'},{s:'Tue',c:'#db2777'},
    {s:'Wed',c:'#16a34a'},{s:'Thu',c:'#ea580c'},{s:'Fri',c:'#0ea5e9'},{s:'Sat',c:'#7e22ce'}
  ];
  const p = (dateStr||'').split('/');
  if (p.length<3) return {s:'?',c:'#888'};
  let yr = parseInt(p[2]); if(yr>2500) yr-=543;
  const d = new Date(yr, parseInt(p[1])-1, parseInt(p[0]));
  return isNaN(d.getTime()) ? {s:'?',c:'#888'} : CFG[d.getDay()];
}
